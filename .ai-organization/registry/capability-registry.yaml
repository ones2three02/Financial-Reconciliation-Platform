# AI Organization Capability Registry
# 维护全局能力字典，用于岗位要求与 Agent 能力缺口检测
capabilities:
  - id: "strategic-planning"
    name: "战略规划"
    description: "制定长远目标与核心业务方向的能力。"
  - id: "executive-decision"
    name: "高层决策"
    description: "重大事件裁决与政策修正的能力。"
  - id: "team-building"
    name: "团队组建"
    description: "依据 RACI 矩阵与任务 WBS 组建开发团队的能力。"
  - id: "process-orchestration"
    name: "流程调度"
    description: "调配多 Agent 执行步骤并保障数据流向的规范性。"
  - id: "project-planning"
    name: "项目规划"
    description: "拆解 WBS，制定里程碑与估算工期的能力。"
  - id: "raci-tracking"
    name: "RACI 追踪"
    description: "监控 R/A/C/I 责任落实情况，协调阻碍事项。"
  - id: "workforce-planning"
    name: "人力规划"
    description: "评估编制空缺，审核岗位招聘合理性的能力。"
  - id: "recruitment-sourcing"
    name: "招聘搜寻"
    description: "发布岗位说明书、寻找/创建候选 Agent 档案的能力。"
  - id: "candidate-interview"
    name: "候选人面试"
    description: "按五维矩阵对候选人进行考核并输出打分报告的能力。"
  - id: "agent-onboarding"
    name: "员工入职引导"
    description: "注册 Agent，分配权限，同步核心规则及代码资产的能力。"
  - id: "system-architecture"
    name: "系统架构"
    description: "宏观系统解耦、技术选型与服务拓扑设计。"
  - id: "database-design"
    name: "数据库设计"
    description: "关系型或非关系型数据库模型建立与迁移脚本设计。"
  - id: "security-governance"
    name: "安全治理"
    description: "网络边界隔离、密钥存储、API 鉴权与审计流审查。"
  - id: "backend-development"
    name: "后端开发"
    description: "基于 Java/Node/Go 等语言的业务逻辑实现与接口输出。"
  - id: "frontend-development"
    name: "前端开发"
    description: "基于 React/Vue/HTML 等实现高质感用户交互界面。"
  - id: "devops-pipeline"
    name: "DevOps 流水线"
    description: "Docker 容器化、K8s 部署配置与 CI/CD 流程编写。"
  - id: "test-automation"
    name: "自动化测试"
    description: "单元测试、集成测试与端到端测试用例自动生成与执行。"
  - id: "code-review"
    name: "代码审查"
    description: "按照代码规范、设计模式及安全规程进行审计的能力。"
  - id: "hr-payroll"
    name: "薪酬发放"
    description: "处理社保公积金、税率计算与工资账单生成的专业知识。"
  - id: "finance-accounting"
    name: "财务会计"
    description: "虚拟企业账目记录、资产负债表与税务合规审计。"
  - id: "legal-compliance"
    name: "法务合规"
    description: "合同条款起草、用户隐私政策和劳动法规合规审查。"
