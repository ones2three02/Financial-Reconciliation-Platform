# AI Role Registry
# 定义企业内的标准岗位和其需要具备的核心能力要求
roles:
  - id: "CEO"
    department: "executive"
    description: "虚拟企业最高决策者，协调组织方向与终审。"
    required_capabilities:
      - "strategic-planning"
      - "executive-decision"
      - "arbitration"
  - id: "Organization Manager"
    department: "executive"
    description: "管理组织日常运行、组建项目与流程调度。"
    required_capabilities:
      - "team-building"
      - "process-orchestration"
  - id: "AI HR Manager"
    department: "hr"
    description: "负责人力规划与组织编制，审批录用决定。"
    required_capabilities:
      - "workforce-planning"
  - id: "Recruiter"
    department: "hr"
    description: "发布岗位申请，寻找并筛选候选 Agent。"
    required_capabilities:
      - "recruitment-sourcing"
  - id: "Interviewer"
    department: "hr"
    description: "对候选 Agent 进行专业面试打分。"
    required_capabilities:
      - "candidate-interview"
  - id: "Onboarding Specialist"
    department: "hr"
    description: "引导新入职 Agent 学习公司规则，并在注册表中激活。"
    required_capabilities:
      - "agent-onboarding"
  - id: "Project Manager"
    department: "pmo"
    description: "制定项目计划、跟踪任务状态与 RACI 指标。"
    required_capabilities:
      - "project-planning"
      - "raci-tracking"
  - id: "Product Manager"
    department: "pmo"
    description: "收集需求，负责产品 PRD 编写与原型设计说明。"
    required_capabilities:
      - "project-planning"
  - id: "Solution Architect"
    department: "engineering"
    description: "负责系统的宏观技术架构设计与接口拆解。"
    required_capabilities:
      - "system-architecture"
  - id: "Database Architect"
    department: "engineering"
    description: "负责数据库模型设计、索引优化与 SQL 审计。"
    required_capabilities:
      - "database-design"
  - id: "Security Architect"
    department: "engineering"
    description: "把控系统网络、数据安全、代码防注入及访问权限控制。"
    required_capabilities:
      - "security-governance"
  - id: "Backend Engineer"
    department: "engineering"
    description: "实现后端核心逻辑，保证代码鲁棒性与可测性。"
    required_capabilities:
      - "backend-development"
      - "api-design"
  - id: "Frontend Engineer"
    department: "engineering"
    description: "构建高质量的前端页面，优化用户交互体感。"
    required_capabilities:
      - "frontend-development"
  - id: "DevOps Engineer"
    department: "engineering"
    description: "编写 CI/CD 构建流水线与容器镜像配置。"
    required_capabilities:
      - "devops-pipeline"
  - id: "QA Engineer"
    department: "qa"
    description: "编写测试用例并执行全流程自动化功能测试。"
    required_capabilities:
      - "test-automation"
  - id: "Quality Reviewer"
    department: "qa"
    description: "审计代码风格、设计质量与架构依从度。"
    required_capabilities:
      - "code-review"
  - id: "HR Expert"
    department: "domain"
    description: "专门提供劳动合同法、考勤假期等专家意见。"
    required_capabilities:
      - "legal-compliance"
  - id: "Finance Expert"
    department: "domain"
    description: "专门处理公司账务、税率计算与工资表发放的专家。"
    required_capabilities:
      - "hr-payroll"
      - "finance-accounting"
  - id: "Legal Expert"
    department: "domain"
    description: "专门提供软件版权法、隐私政策、协议合规初审的专家。"
    required_capabilities:
      - "legal-compliance"
