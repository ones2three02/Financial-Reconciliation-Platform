name: "Publish Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: ""
          - platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.21.0
          pip install -r backend/requirements.txt

      - name: Build Python Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          pyinstaller --onefile --noconsole --clean -y --name frp-backend --collect-all uvicorn --collect-all alembic --collect-all backend --add-data "backend/alembic.ini;backend" --add-data "backend/migrations;backend/migrations" backend/run.py
          cp dist/frp-backend.exe frontend/src-tauri/binaries/frp-backend-x86_64-pc-windows-msvc.exe

      - name: Build Python Sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p frontend/src-tauri/binaries
          TARGET_TRIPLE=$(rustc -vV | grep host | cut -d ' ' -f 2)
          pyinstaller --onefile --clean -y --name frp-backend --collect-all uvicorn --collect-all alembic --collect-all backend --add-data "backend/alembic.ini:backend" --add-data "backend/migrations:backend/migrations" backend/run.py
          cp dist/frp-backend frontend/src-tauri/binaries/frp-backend-$TARGET_TRIPLE
          xattr -cr frontend/src-tauri/binaries/frp-backend-$TARGET_TRIPLE || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend Vue
        working-directory: frontend
        run: npm run build

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "ReconFlow ${{ github.ref_name }}"
          releaseBody: "自动生成的 ReconFlow 桌面安装包（包含 macOS 与 Windows 平台）"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
