name: "Publish Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: ""
          - platform: "windows-latest"
            args: "--bundles nsis,updater"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify desktop release version
        shell: bash
        run: python backend/scripts/verify_desktop_version.py "${GITHUB_REF_NAME}" frontend/src-tauri/tauri.conf.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.21.0
          pip install -r backend/requirements.txt

      - name: Build Python Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/resources
          pyinstaller --onedir --noconsole --clean -y --name frp-backend-dir --collect-all uvicorn --collect-all alembic --collect-all backend --add-data "backend/alembic.ini;backend" --add-data "backend/migrations;backend/migrations" backend/run.py
          cp -r dist/frp-backend-dir frontend/src-tauri/resources/frp-backend-dir

      - name: Build Python Sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p frontend/src-tauri/resources
          pyinstaller --onedir --clean -y --name frp-backend-dir --collect-all uvicorn --collect-all alembic --collect-all backend --add-data "backend/alembic.ini:backend" --add-data "backend/migrations:backend/migrations" backend/run.py
          cp -R dist/frp-backend-dir frontend/src-tauri/resources/frp-backend-dir
          xattr -cr frontend/src-tauri/resources/frp-backend-dir || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend Vue
        working-directory: frontend
        run: npm run build

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "ReconFlow ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  verify-updater-release:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Windows updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater-assets
          gh release download "${GITHUB_REF_NAME}" --pattern "*.nsis.zip.sig" --dir updater-assets
          python backend/scripts/create_updater_manifest.py updater-assets/*.nsis.zip.sig "${GITHUB_REF_NAME}" latest.json
          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber

      - name: Download updater manifest
        run: >-
          curl --fail --location --retry 8 --retry-all-errors
          "https://github.com/ones2three02/Financial-Reconciliation-Platform/releases/download/${GITHUB_REF_NAME}/latest.json"
          --output latest.json

      - name: Verify Windows updater manifest
        run: python backend/scripts/verify_updater_manifest.py latest.json "${GITHUB_REF_NAME}"
